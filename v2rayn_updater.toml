# V2RayN 自动化更新工具配置文件

# V2RayN 安装目录
v2rayn_path = "D:\\AppBundles\\V2Ray"

# 要更新的订阅分组名称，留空则更新所有分组
target_subscriptions = []

[speed_test]
# 测速模式：
# - "tcp": TCP 连接延迟测试（快速筛选）
# - "proxy": 通过 SOCKS5 代理测速（切换 V2RayN 节点）
# - "both": 先 TCP 筛选，再用代理测速
# - "singbox": 使用 singtools 测速（不切换节点，直接用节点测速）
speed_mode = "singbox"

# 延迟测试 URL（用于测量响应时间）
# 推荐使用 CloudFlare 端点，国内可稳定访问
ping_url = "https://cloudflare.com/cdn-cgi/trace"

# 速度测试 URL（用于测量下载速度）
# 推荐使用 CloudFlare 测速端点
# - https://speed.cloudflare.com/__down?bytes=1048576 (1MB)
# - https://speed.cloudflare.com/__down?bytes=10485760 (10MB)
# 注意：cachefly.cachefly.net 可能无法通过代理访问
speed_url = "https://speed.cloudflare.com/__down?bytes=1048576"

# 测速超时时间（秒）
timeout = 5

# 并发测速数量
max_concurrency = 10

# 速度测试下载字节数（用于计算速度）
# 1MB = 1048576 bytes
test_bytes = 1048576

# singtools 配置（用于 singbox 测速模式）
# singtools 路径
singtools_path = "C:\\GreenSoft\\singtools\\singtools.exe"

# singtools 测速 URL（推荐使用国内可访问的地址）
singbox_ping_url = "https://www.bt.cn/api/website/test"
singbox_download_url = "https://www.bt.cn/api/website/test"

# singtools 并发数量
singbox_concurrency = 4

# 自动重启 V2RayN
auto_restart = true

# 日志设置
[log]
# 是否输出到控制台
print_to_console = true
